<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nota Online</title>
  <script type="text/javascript" src="https://me.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=Mf5eNakRkQpVv15N9bVNXRuQMGLR_66TojOzY-YAhEKcLAtb76Dtco11xCz7n41U3BioGDOE37paT54C302GHhPaSU4EjbMuyAhiS9B0jRPX_apDsPZneJt_dX_MAb0fUblQ7l3ErmqPnMbq-E_AkqcWykqA_GDehCO5p5zQQm1NB8GQyrmUJ-0I-k3FmX_m8l5IJ7ZJrTfXzi2q9Fz8SSwLGNJXbWF9eg6_6XrIKQDiRVvOhJjtupNwRuCxRiK10DOvE74TZUQdT3LRe1bAqQfUS5BSCEda50ZkNInvBtsfaaHbof3aMJqEK_nCtBtu" charset="UTF-8"></script><style>
    :root {
      --blue: #0f62fe;
      --dark: #0f172a;
      --muted: #64748b;
      --line: #dbe4f0;
      --green: #16a34a;
      --orange: #f59e0b;
      --red: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fb;
      color: var(--dark);
      padding: 26px;
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    .toolbar { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 16px; }
    .btn { border: 1px solid var(--line); background: white; border-radius: 10px; padding: 10px 14px; font-weight: 800; cursor: pointer; color: var(--dark); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
    .paper { position: relative; background: white; border: 1px solid var(--line); border-radius: 20px; padding: 36px; box-shadow: 0 18px 50px rgba(15,23,42,.08); overflow: hidden; }
    .watermark { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; transform: rotate(-24deg); font-size: clamp(84px, 18vw, 170px); font-weight: 1000; color: rgba(22, 163, 74, .10); pointer-events: none; letter-spacing: .08em; }
    .paid .watermark { display: flex; }
    .header { text-align: center; border-bottom: 2px dashed #94a3b8; padding-bottom: 24px; margin-bottom: 22px; position: relative; z-index: 1; }
    .invoice-title { font-size: 34px; letter-spacing: .03em; margin: 0 0 16px; font-weight: 1000; }
    .shop { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .logo { width: 72px; height: 72px; border-radius: 50%; background: #0f254d; color: white; display: grid; place-items: center; font-size: 36px; }
    .shop h2 { margin: 0; font-size: 27px; }
    .shop p { margin: 5px 0; color: var(--muted); }
    .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-bottom: 2px dashed #94a3b8; padding-bottom: 18px; margin-bottom: 22px; position: relative; z-index: 1; }
    .meta-box { display: grid; gap: 10px; }
    .line { display: grid; grid-template-columns: 150px 1fr; gap: 10px; font-size: 15px; }
    .line b { color: #334155; }
    .status { display: inline-flex; padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 900; }
    .status.paid { background: #dcfce7; color: #15803d; }
    .status.wait { background: #fff7ed; color: #c2410c; }
    .status.unpaid { background: #f1f5f9; color: #475569; }
    table { width: 100%; border-collapse: collapse; position: relative; z-index: 1; }
    th { background: #0f254d; color: white; padding: 12px; text-align: left; }
    th:first-child { border-radius: 9px 0 0 9px; }
    th:last-child { border-radius: 0 9px 9px 0; }
    td { padding: 13px 12px; border-bottom: 1px solid var(--line); }
    .right { text-align: right; }
    .center { text-align: center; }
    .totals { width: min(360px, 100%); margin-left: auto; margin-top: 18px; position: relative; z-index: 1; }
    .total-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #cbd5e1; }
    .grand { margin-top: 10px; background: #eff6ff; color: var(--blue); padding: 14px; border-radius: 12px; font-size: 22px; font-weight: 1000; display: flex; justify-content: space-between; }
    .payment-box { margin-top: 22px; border: 1px solid var(--line); border-radius: 14px; padding: 16px; background: #fbfdff; position: relative; z-index: 1; }
    .payment-box h3 { margin: 0 0 12px; }
    .payment-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px 20px; }
    .note { margin-top: 20px; text-align: center; color: #334155; border-top: 2px dashed #94a3b8; padding-top: 18px; position: relative; z-index: 1; }
    .error { background: white; border: 1px solid var(--line); padding: 28px; border-radius: 16px; text-align: center; }
    .muted { color: var(--muted); }

    @media (max-width: 720px) {
      body { padding: 7px; }
      .wrap { max-width: 100%; }
      .toolbar { position: sticky; top: 0; z-index: 10; margin-bottom: 7px; padding: 4px 0; background: #f6f8fb; flex-wrap: wrap; }
      .btn { padding: 8px 9px; border-radius: 8px; font-size: 12px; gap: 5px; }
      .paper { padding: 13px; border-radius: 12px; box-shadow: 0 8px 22px rgba(15,23,42,.07); }
      .watermark { font-size: clamp(72px, 25vw, 116px); }
      .header { padding-bottom: 12px; margin-bottom: 12px; }
      .invoice-title { margin-bottom: 9px; font-size: 22px; }
      .shop { flex-direction: row; justify-content: flex-start; gap: 10px; text-align: left; }
      .logo { width: 45px; height: 45px; flex: 0 0 45px; font-size: 23px; }
      .shop h2 { font-size: 18px; }
      .shop p { margin: 2px 0; font-size: 11px; line-height: 1.3; }
      .meta { grid-template-columns: 1fr; gap: 5px; margin-bottom: 12px; padding-bottom: 12px; }
      .meta-box { gap: 5px; }
      .line { grid-template-columns: 105px minmax(0, 1fr); gap: 5px; font-size: 12px; line-height: 1.35; }
      .status { padding: 4px 8px; font-size: 10px; white-space: normal; }

      /* HP: nota harus pas di layar dan tidak boleh scroll ke samping. */
      html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
      .wrap, .paper, .toolbar, .header, .shop, .meta, .meta-box,
      .table-scroll, .totals, .payment-box, .payment-grid, .note {
        min-width: 0;
        max-width: 100%;
      }
      .shop > div:last-child, .line span, .line b, .payment-grid > div {
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .table-scroll { width: 100%; overflow: visible; }
      table { width: 100%; min-width: 0; table-layout: fixed; }
      th, td { padding: 7px 4px; font-size: 11px; overflow-wrap: anywhere; word-break: break-word; }
      th:first-child, td:first-child { width: 30px !important; }
      th:nth-child(2), td:nth-child(2) { width: auto !important; }
      th:nth-child(3), td:nth-child(3) { width: 38px !important; }
      th:nth-child(5), td:nth-child(5) { width: 92px !important; }
      th:first-child { border-radius: 7px 0 0 7px; }
      th:last-child { border-radius: 0 7px 7px 0; }
      .hide-mobile { display: none; }
      .totals { width: 100%; margin-top: 10px; }
      .total-row { padding: 7px 0; font-size: 13px; }
      .grand { margin-top: 6px; padding: 10px; border-radius: 9px; font-size: 17px; }
      .payment-box { margin-top: 12px; padding: 11px; border-radius: 10px; font-size: 12px; }
      .payment-box h3 { margin-bottom: 7px; font-size: 15px; }
      .payment-grid { grid-template-columns: 1fr; gap: 6px; }
      .note { margin-top: 12px; padding-top: 12px; }
      .note h3 { margin: 0 0 5px; font-size: 15px; }
      .note p { margin: 0; font-size: 12px; line-height: 1.4; }
      .error { padding: 20px 14px; border-radius: 12px; }
    }

    @media print {
      body { background: white; padding: 0; }
      .toolbar { display: none; }
      .paper { box-shadow: none; border: 0; border-radius: 0; }
    }
  </style>
</head>
<body>
  <script>
    /********************************************************
     * WAJIB SAMA DENGAN index.html
     ********************************************************/
    const API_URL = 'https://script.google.com/macros/s/AKfycbyHafpe1jKZjATmIBu2mt7ZJLE64OjUnA1qlYLr-AsOj-aaLdgNI5IkFpNiRRBdt7M6/exec';
  </script>

  <div class="wrap">
    <div class="toolbar">
      <a class="btn" href="index.html">← Kembali</a>
      <button class="btn primary" onclick="window.print()">🖨 Cetak / Simpan PDF</button>
    </div>
    <div id="root"><div class="error"><h2>Memuat nota...</h2><p class="muted">Mohon tunggu sebentar.</p></div></div>
  </div>

  <script>
    const PUBLIC_INVOICE_CACHE_PREFIX = 'NOTAKU_PUBLIC_INVOICE_V1_';
    const PUBLIC_INVOICE_CACHE_MAX_AGE_MS = 120000;

    function api(action, data = {}) {
      return new Promise((resolve, reject) => {
        const cb = 'notaku_public_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
        const params = new URLSearchParams();
        params.set('action', action);
        params.set('callback', cb);
        Object.keys(data || {}).forEach(key => params.set(key, String(data[key] ?? '')));

        const script = document.createElement('script');
        const sep = API_URL.includes('?') ? '&' : '?';
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Request terlalu lama.'));
        }, 30000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[cb] = response => {
          cleanup();
          resolve(response);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error('Gagal menghubungi server nota.'));
        };
        script.src = API_URL + sep + params.toString();
        document.body.appendChild(script);
      });
    }

    async function init() {
      if (!API_URL || API_URL.includes('PASTE_URL')) {
        document.getElementById('root').innerHTML = `<div class="error"><h2>API_URL belum diisi</h2><p>Ganti PASTE_URL_WEB_APP_APPS_SCRIPT_DI_SINI di file invoice.html.</p></div>`;
        return;
      }
      const id = new URLSearchParams(location.search).get('id') || '';
      if (!id) {
        document.getElementById('root').innerHTML = `<div class="error"><h2>No nota tidak ada</h2><p>URL harus memakai format <b>invoice.html?id=NT-...</b></p></div>`;
        return;
      }

      // Jika pembeli membuka ulang nota yang sama, tampilkan salinan terakhir
      // dari browser seketika lalu perbarui status dari server di latar belakang.
      const cached = readPublicInvoiceCache(id);
      if (cached) render(cached.data);

      try {
        const res = await api('getPublicInvoice', { invoiceId: id });
        if (res && res.ok) writePublicInvoiceCache(id, res);
        render(res);
      } catch (err) {
        if (!cached) {
          document.getElementById('root').innerHTML = `<div class="error"><h2>Gagal memuat nota</h2><p>${escapeHtml(err.message || 'Terjadi kesalahan.')}</p></div>`;
        }
      }
    }

    function readPublicInvoiceCache(id) {
      try {
        const cached = JSON.parse(localStorage.getItem(PUBLIC_INVOICE_CACHE_PREFIX + id) || 'null');
        if (!cached || !cached.data || Date.now() - cached.savedAt > PUBLIC_INVOICE_CACHE_MAX_AGE_MS) return null;
        return cached;
      } catch (err) { return null; }
    }

    function writePublicInvoiceCache(id, data) {
      try {
        localStorage.setItem(PUBLIC_INVOICE_CACHE_PREFIX + id, JSON.stringify({ data, savedAt: Date.now() }));
      } catch (err) {}
    }

    function render(data) {
      const root = document.getElementById('root');
      if (!data.ok) {
        root.innerHTML = `<div class="error"><h2>Nota tidak ditemukan</h2><p>${escapeHtml(data.message || 'Data nota tidak tersedia.')}</p></div>`;
        return;
      }

      const inv = data.invoice;
      const items = data.items || [];
      const b = data.business || {};
      const isPaid = inv.status === 'Lunas';
      const itemRows = items.map((item, idx) => `
        <tr>
          <td class="center">${idx + 1}</td>
          <td>${escapeHtml(item.productName)}</td>
          <td class="center">${item.qty}</td>
          <td class="right hide-mobile">${rupiah(item.price)}</td>
          <td class="right"><b>${rupiah(item.subtotal)}</b></td>
        </tr>
      `).join('');

      const showPaymentInfo = isTransfer(inv.paymentMethod);
      const paidExtra = isPaid && inv.paidAt ? `<div class="line"><b>Tanggal Lunas</b><span>${escapeHtml(formatDateTime(inv.paidAt))}</span></div>` : '';

      root.innerHTML = `
        <article class="paper ${isPaid ? 'paid' : ''}">
          <div class="watermark">LUNAS</div>
          <header class="header">
            <h1 class="invoice-title">${isPaid ? 'NOTA LUNAS' : 'NOTA PEMESANAN'}</h1>
            <div class="shop">
              <div class="logo">▥</div>
              <div>
                <h2>${escapeHtml(b.businessName || 'Toko Busana Online')}</h2>
                <p>${escapeHtml(b.tagline || '')}</p>
                <p>☎ ${escapeHtml(b.phone || '')} &nbsp; • &nbsp; ${escapeHtml(b.instagram || '')}</p>
              </div>
            </div>
          </header>

          <section class="meta">
            <div class="meta-box">
              <div class="line"><b>No. Nota</b><span>${escapeHtml(inv.invoiceId)}</span></div>
              <div class="line"><b>Tanggal</b><span>${escapeHtml(formatDateHuman(inv.date))}</span></div>
              <div class="line"><b>Nama Pelanggan</b><span>${escapeHtml(inv.customerName)}</span></div>
              <div class="line"><b>No. WhatsApp</b><span>${escapeHtml(inv.customerPhone)}</span></div>
            </div>
            <div class="meta-box">
              <div class="line"><b>Metode</b><span>${escapeHtml(inv.paymentMethod)}</span></div>
              <div class="line"><b>Status</b><span><span class="status ${statusClass(inv.status)}">${escapeHtml(inv.status)}</span></span></div>
              ${paidExtra}
            </div>
          </section>

          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th style="width:60px">No</th>
                  <th>Produk</th>
                  <th class="center" style="width:90px">Qty</th>
                  <th class="right hide-mobile" style="width:150px">Harga Satuan</th>
                  <th class="right" style="width:150px">Subtotal</th>
                </tr>
              </thead>
              <tbody>${itemRows}</tbody>
            </table>
          </div>

          <section class="totals">
            <div class="total-row"><span>Subtotal</span><b>${rupiah(inv.subtotal)}</b></div>
            <div class="grand"><span>Total Bayar</span><span>${rupiah(inv.total)}</span></div>
          </section>

          ${showPaymentInfo ? `
          <section class="payment-box">
            <h3>Informasi Pembayaran</h3>
            <div class="payment-grid">
              <div><b>Bank/Metode</b><br>${escapeHtml(inv.bankName || inv.paymentMethod)}</div>
              <div><b>No. Rekening</b><br>${escapeHtml(inv.accountNumber || '-')}</div>
              <div><b>Atas Nama</b><br>${escapeHtml(inv.accountName || '-')}</div>
              <div><b>Status</b><br><span class="status ${statusClass(inv.status)}">${escapeHtml(inv.status)}</span></div>
            </div>
          </section>` : `
          <section class="payment-box">
            <h3>Informasi Pembayaran</h3>
            <p style="margin:0">Pembayaran dilakukan secara <b>${escapeHtml(inv.paymentMethod)}</b>.</p>
          </section>`}

          ${inv.note ? `<section class="payment-box"><h3>Catatan</h3><p style="margin:0">${escapeHtml(inv.note)}</p></section>` : ''}

          <footer class="note">
            <h3>${isPaid ? 'Terima kasih, pembayaran Anda sudah kami terima.' : 'Terima kasih atas pesanan Anda.'}</h3>
            <p>${isPaid ? 'Nota ini merupakan bukti pembayaran lunas.' : 'Silakan selesaikan pembayaran sesuai metode yang dipilih.'}</p>
          </footer>
        </article>
      `;
    }

    function rupiah(value) {
      return 'Rp' + Math.round(Number(value || 0)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    }
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }
    function statusClass(status) {
      if (status === 'Lunas') return 'paid';
      if (status === 'Menunggu Pembayaran') return 'wait';
      return 'unpaid';
    }
    function formatDateHuman(value) {
      if (!value) return '-';
      const parts = String(value).slice(0,10).split('-');
      if (parts.length !== 3) return value;
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }
    function formatDateTime(value) {
      if (!value) return '-';
      const text = String(value).replace('T', ' ');
      const date = text.slice(0,10);
      const time = text.slice(11,16);
      return formatDateHuman(date) + (time ? ' ' + time : '');
    }
    function isTransfer(method) {
      const text = String(method || '').toLowerCase();
      return text.includes('transfer') || text.includes('tf') || text.includes('qris');
    }

    init();
  </script>

  <script>
    /* Register Service Worker khusus GitHub Pages */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(error => console.warn('Service worker gagal didaftarkan:', error));
      });
    }
  </script>
</body>
</html>
